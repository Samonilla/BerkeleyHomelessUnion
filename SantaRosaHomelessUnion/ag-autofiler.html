<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Santa Rosa Homeless Union — AG Auto Filer</title>
  <meta name="description" content="Santa Rosa Homeless Union Attorney General complaint autofiler for Sam Jones Shelter." />
  <style>
    :root {
      --black: #080808;
      --off: #101010;
      --white: #f8e86d;
      --mid: #c8a900;
      --rule: #2f2f2f;
      --accent: #ffc700;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background: var(--black);
      color: var(--white);
      line-height: 1.5;
    }
    .container {
      max-width: 980px;
      margin: 0 auto;
      padding: 2rem;
    }
    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      border-bottom: 1px solid var(--rule);
      padding-bottom: 1rem;
      margin-bottom: 2rem;
    }
    .brand {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .back {
      color: var(--white);
      text-decoration: none;
      border: 1px solid var(--rule);
      padding: 0.5rem 0.8rem;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    h1 {
      margin: 0 0 0.5rem;
      font-size: clamp(2rem, 5vw, 3rem);
    }
    p {
      margin: 0 0 1rem;
      color: var(--mid);
      font-size: 1rem;
    }
    .card {
      background: var(--off);
      border: 1px solid var(--rule);
      padding: 1.5rem;
      margin-top: 1.5rem;
    }
    .btn {
      display: inline-block;
      margin-top: 0.8rem;
      text-decoration: none;
      background: var(--accent);
      color: #000;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.8rem 1.1rem;
      font-size: 0.78rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="top">
      <div class="brand">Santa Rosa Homeless Union</div>
      <a href="index.html#hero" class="back">Back to Home</a>
    </div>

    <h1>AG Complaint Auto Filer</h1>
    <p>
      This is a separate Santa Rosa-only tool for filing California Attorney General
      complaints focused on Sam Jones Shelter.
    </p>

    <div class="card">
      <p><strong>Tool target:</strong> Sam Jones Shelter complaints</p>
      <p><strong>Mode:</strong> Sam Jones prefilled complaint workflow</p>
      <a
        class="btn"
        href="https://berkeleyhomelessunion.streamlit.app/?org=santa_rosa&mode=sam_jones"
        target="_blank"
        rel="noopener"
      >
        Open Sam Jones AG Filer
      </a>
    </div>
  </div>
</body>
</html>
